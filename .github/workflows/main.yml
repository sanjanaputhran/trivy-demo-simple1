name: Scan MY Cloned Repo → Container Security

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker from MY repo
      run: docker build -t demo-app .

    - name: Trivy scans MY image (Vulnerabilities + Misconfigurations)
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: 'demo-app'
        format: 'sarif'
        output: 'trivy-results.sarif'
        scanners: 'vuln,misconfig'

    - name: Download Custom Trivy HTML Template
      run: |
        mkdir -p contrib
        cat << 'EOF' > contrib/custom-html.tpl
        <html>
        <head>
        <title>Trivy Security Report</title>

        <style>
        body {
          font-family: Arial, sans-serif;
          background-color: #f4f6f8;
          margin: 40px;
        }

        h1 { color: #2c3e50; }
        h2 { color: #34495e; }

        table {
          border-collapse: collapse;
          width: 100%;
          background: white;
          box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        th {
          background-color: #2c3e50;
          color: white;
          padding: 10px;
        }

        td {
          padding: 8px;
          border-bottom: 1px solid #ddd;
        }

        tr:hover { background-color: #f1f1f1; }

        .CRITICAL {background:#8b0000;color:white;padding:4px 8px;border-radius:4px;}
        .HIGH {background:#e74c3c;color:white;padding:4px 8px;border-radius:4px;}
        .MEDIUM {background:#f39c12;color:white;padding:4px 8px;border-radius:4px;}
        .LOW {background:#3498db;color:white;padding:4px 8px;border-radius:4px;}
        .UNKNOWN {background:#7f8c8d;color:white;padding:4px 8px;border-radius:4px;}

        </style>

        </head>

        <body>

        <h1>Container Security Report</h1>

        {{ range . }}

        <h2>Target: {{ .Target }}</h2>

        {{ if .Vulnerabilities }}
        <h3>Vulnerabilities</h3>
        <table>
        <tr>
        <th>Package</th>
        <th>Severity</th>
        <th>Installed Version</th>
        <th>Fixed Version</th>
        <th>Location</th>
        <th>Description</th>
        </tr>

        {{ range .Vulnerabilities }}
        <tr>
        <td>{{ .PkgName }}</td>
        <td><span class="{{ .Severity }}">{{ .Severity }}</span></td>
        <td>{{ .InstalledVersion }}</td>
        <td>{{ .FixedVersion }}</td>
        <td>{{ .PkgPath }}</td>
        <td>{{ .Title }}</td>
        </tr>
        {{ end }}

        </table>
        {{ end }}

        {{ if .Misconfigurations }}
        <h3>Misconfigurations</h3>

        <table>
        <tr>
        <th>ID</th>
        <th>Severity</th>
        <th>Title</th>
        <th>Description</th>
        </tr>

        {{ range .Misconfigurations }}
        <tr>
        <td>{{ .ID }}</td>
        <td><span class="{{ .Severity }}">{{ .Severity }}</span></td>
        <td>{{ .Title }}</td>
        <td>{{ .Description }}</td>
        </tr>
        {{ end }}

        </table>
        {{ end }}

        <br><br>

        {{ end }}

        </body>
        </html>
        EOF

    - name: Generate Trivy HTML Report
      run: |
        trivy image \
        --scanners vuln,misconfig \
        --format template \
        --template "@contrib/custom-html.tpl" \
        -o trivy-report.html demo-app

    - name: Upload HTML Report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-html-report
        path: trivy-report.html

    - name: Upload Results to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
